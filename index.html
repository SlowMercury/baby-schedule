      { time: "09:15", who: "mom", icon: "\u{1F931}", action: "Кормление грудью", note: "" },
      { time: "09:30", who: "grandma", icon: "\u{1F475}", action: "Бабушка с малышом между кормлениями", note: "Подгузники, укачивание — приносит малыша маме на кормление" },
      { time: "09:30", who: "dad_work", icon: "\u{1F4BB}", action: "Папа работает (без перерывов)", note: "Бабушка берёт на себя малыша" },
      { time: "09:30", who: "mom", icon: "\u{1F931}", action: "Кормление по требованию (~каждые 1,5 ч)", note: "Бабушка приносит малыша, мама только кормит и отдыхает" },
      { time: "13:00", who: "mom_self", icon: "\u{1F37D}\uFE0F", action: "Мама обедает", note: "Малыш у бабушки" },

};

const COLOR_MAP = {
  mom:       { bg: "#FDE8E8", border: "#E53E3E", text: "#9B2C2C", label: "Мама: кормление" },
  mom_sleep: { bg: "#C3DAFE", border: "#4C51BF", text: "#2A4365", label: "Мама: сон" },
  mom_self:  { bg: "#FEFCBF", border: "#D69E2E", text: "#744210", label: "Мама: для себя" },
  dad:       { bg: "#C6F6D5", border: "#38A169", text: "#22543D", label: "Папа: с малышом" },
  dad_sleep: { bg: "#BEE3F8", border: "#3182CE", text: "#2A4365", label: "Папа: сон" },
  dad_work:  { bg: "#E9D8FD", border: "#805AD5", text: "#44337A", label: "Папа: работа" },
  dad_self:  { bg: "#FEFCBF", border: "#D69E2E", text: "#744210", label: "Папа: для себя" },
  grandma:   { bg: "#FEEBC8", border: "#DD6B20", text: "#7B341E", label: "Бабушка" },

const formulaInfo = [
  ["День 7", "50–60 мл"],
  ["День 10", "60–70 мл"],
  ["День 14", "70–80 мл"],
  ["Неделя 3–4", "80–90 мл"],
];

function Schedule() {
  const [activeTab, setActiveTab] = useState("regular");
  const [expandedIdx, setExpandedIdx] = useState(null);
  const data = SCHEDULE_DATA[activeTab];

  const s = (obj) => obj; // style passthrough

  return e("div", null,
    // Header
    e("div", { style: s({ textAlign: "center", marginBottom: 20 }) },
      e("div", { style: s({ fontSize: 32, marginBottom: 4 }) }, "\u{1F476}"),
      e("h1", { style: s({ fontSize: 22, fontWeight: 800, color: "#2D3748", margin: "0 0 4px 0", letterSpacing: "-0.5px" }) }, "Расписание — 7-й день"),
      e("p", { style: s({ fontSize: 13, color: "#718096", margin: 0 }) }, "Малыш 4680 г · 1 кормление смесью/день · Папа на удалёнке")
    ),

    // Tabs
    e("div", { style: s({ display: "flex", gap: 8, marginBottom: 20, padding: "4px", background: "#E2E8F0", borderRadius: 14 }) },
      ["regular", "grandma"].map(function(tab) {
        return e("button", {
          key: tab,
          onClick: function() { setActiveTab(tab); setExpandedIdx(null); },
          style: s({
            flex: 1, padding: "10px 8px", border: "none", borderRadius: 11, cursor: "pointer",
            fontSize: 13, fontWeight: 700, fontFamily: "inherit", transition: "all 0.2s",
            background: activeTab === tab ? "#fff" : "transparent",
            color: activeTab === tab ? "#2D3748" : "#718096",
            boxShadow: activeTab === tab ? "0 2px 8px rgba(0,0,0,0.08)" : "none",
          })
        }, tab === "regular" ? "\u{1F4C5} Обычный день" : "\u{1F475} День с бабушкой");
      })
    ),

    // Legend
    e("div", { style: s({ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16, padding: "10px 12px", background: "#fff", borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }) },
      Object.entries(COLOR_MAP)
        .filter(function(entry) { return activeTab === "grandma" || entry[0] !== "grandma"; })
        .map(function(entry) {
          var key = entry[0], val = entry[1];
          return e("div", { key: key, style: s({ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#4A5568" }) },
            e("div", { style: s({ width: 10, height: 10, borderRadius: 3, background: val.bg, border: "2px solid " + val.border }) }),
            val.label
          );
        })
    ),

    // Timeline
    e("div", { style: s({ position: "relative", paddingLeft: 52 }) },
      e("div", { style: s({ position: "absolute", left: 39, top: 0, bottom: 0, width: 2, background: "linear-gradient(to bottom, #CBD5E0, #A0AEC0, #CBD5E0)" }) }),
      data.blocks.map(function(block, i) {
        var colors = COLOR_MAP[block.who];
        var isFormula = block.icon === "\u{1F37C}";
        var isExpanded = expandedIdx === i;

        return e("div", {
          key: i,
          onClick: function() { setExpandedIdx(isExpanded ? null : i); },
          style: s({ position: "relative", marginBottom: 6, cursor: block.note ? "pointer" : "default" })
        },
          // Dot
          e("div", { style: s({
            position: "absolute", left: -20, top: 10,
            width: isFormula ? 14 : 10, height: isFormula ? 14 : 10,
            borderRadius: "50%", background: colors.border,
            border: "2px solid " + (isFormula ? "#E53E3E" : "#fff"),
            boxShadow: isFormula ? "0 0 0 3px #FEB2B2" : "0 1px 2px rgba(0,0,0,0.1)",
            marginLeft: isFormula ? -2 : 0, marginTop: isFormula ? -2 : 0, zIndex: 2,
          }) }),
          // Time
          e("div", { style: s({ position: "absolute", left: -55, top: 8, fontSize: 10, fontWeight: 700, color: "#718096", width: 38, textAlign: "right" }) }, block.time),
          // Card
          e("div", { style: s({
            marginLeft: 10, padding: "8px 12px",
            background: isFormula ? "linear-gradient(135deg, #FFF5F5 0%, #FED7D7 100%)" : colors.bg,
            border: "1.5px solid " + (isFormula ? "#FC8181" : colors.border) + "40",
            borderLeft: "4px solid " + colors.border,
            borderRadius: 10, transition: "all 0.15s",
            boxShadow: isFormula ? "0 2px 8px rgba(229,62,62,0.15)" : "none",
          }) },
            e("div", { style: s({ display: "flex", alignItems: "center", gap: 6 }) },
              e("span", { style: s({ fontSize: 14 }) }, block.icon),
              e("span", { style: s({ fontSize: 12, fontWeight: isFormula ? 800 : 600, color: colors.text, flex: 1 }) }, block.action),
              block.note ? e("span", { style: s({ fontSize: 10, color: "#A0AEC0", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s", display: "inline-block" }) }, "\u25BC") : null
            ),
            isExpanded && block.note ? e("div", { style: s({ marginTop: 6, paddingTop: 6, borderTop: "1px dashed " + colors.border + "40", fontSize: 11, color: "#4A5568", lineHeight: 1.5 }) }, block.note) : null
          )
        );
      })
    ),

    // Sleep totals
    e("div", { style: s({ marginTop: 24, padding: 16, background: "#fff", borderRadius: 14, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }) },
      e("h3", { style: s({ fontSize: 14, fontWeight: 800, color: "#2D3748", margin: "0 0 12px 0" }) }, "\u{1F4A4} Итого сон"),
      e("div", { style: s({ display: "flex", gap: 12 }) },
        e("div", { style: s({ flex: 1, padding: 10, background: "#F7FAFC", borderRadius: 10 }) },
          e("div", { style: s({ fontSize: 11, fontWeight: 700, color: "#E53E3E", marginBottom: 6 }) }, "МАМА"),
          e("div", { style: s({ fontSize: 10, color: "#4A5568", lineHeight: 1.8 }) },
            e("div", null, "\u{1F319} Глубокий: " + data.sleepTotals.mom.solid),
            e("div", null, "\u{1F4A4} Дрёма: " + data.sleepTotals.mom.dozing),
            e("div", null, "\u{1F634} Дневной: " + data.sleepTotals.mom.nap),
            e("div", { style: s({ fontWeight: 800, color: "#2D3748", marginTop: 4, fontSize: 13 }) }, "Всего: " + data.sleepTotals.mom.total)
          )
        ),
        e("div", { style: s({ flex: 1, padding: 10, background: "#F7FAFC", borderRadius: 10 }) },
          e("div", { style: s({ fontSize: 11, fontWeight: 700, color: "#38A169", marginBottom: 6 }) }, "ПАПА"),
          e("div", { style: s({ fontSize: 10, color: "#4A5568", lineHeight: 1.8 }) },
            e("div", null, "\u{1F319} Глубокий: " + data.sleepTotals.dad.solid),
            e("div", { style: s({ fontWeight: 800, color: "#2D3748", marginTop: 4, fontSize: 13 }) }, "Всего: " + data.sleepTotals.dad.total)
          )
        )
      )
    ),

    // Formula reference
    e("div", { style: s({ marginTop: 16, padding: 16, background: "#FFF5F5", borderRadius: 14, border: "1.5px solid #FED7D7" }) },
      e("h3", { style: s({ fontSize: 14, fontWeight: 800, color: "#9B2C2C", margin: "0 0 10px 0" }) }, "\u{1F37C} Объём смеси (1 раз/день, ночное кормление)"),
      e("div", { style: s({ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }) },
        formulaInfo.map(function(item) {
          return e("div", { key: item[0], style: s({ padding: "6px 10px", background: "#fff", borderRadius: 8, display: "flex", justifyContent: "space-between", fontSize: 11 }) },
            e("span", { style: s({ color: "#718096" }) }, item[0]),
            e("span", { style: s({ fontWeight: 800, color: "#9B2C2C" }) }, item[1])
          );
        })
      )
    ),

    // Rules
    e("div", { style: s({ marginTop: 16, padding: 16, background: "#EBF8FF", borderRadius: 14, border: "1.5px solid #BEE3F8", marginBottom: 20 }) },
      e("h3", { style: s({ fontSize: 14, fontWeight: 800, color: "#2A4365", margin: "0 0 8px 0" }) }, "\u26A1 4 железных правила"),
